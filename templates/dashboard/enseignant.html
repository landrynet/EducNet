{% extends 'base.html' %}

{% block content %}
<div class="row g-4 mb-4">
  <div class="col-12">
    <div class="alert alert-info border-0 shadow-sm d-flex align-items-center gap-3">
      <i class="bi bi-info-circle-fill fs-4"></i>
      <div>Bienvenue dans votre espace enseignant. Consultez votre emploi du temps et gérez vos évaluations.</div>
    </div>
  </div>
</div>
<div class="row g-4">
  {% for item in sidebar_menu %}{% if not forloop.first %}
  <div class="col-6 col-md-3">
    <a href="{% url item.url %}" class="module-tile module-tile-lg">
      <i class="bi {{ item.icon }} module-tile-icon"></i>
      <span class="module-tile-label">{{ item.label }}</span>
    </a>
  </div>
  {% endif %}{% endfor %}
</div>
{% endblock %}
