{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0 fw-bold">
    <i class="bi bi-person-badge me-2 text-primary"></i>Emplois du temps des enseignants
  </h4>
  <a href="{% url 'timetable:index' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>

<div class="row g-3">
  {% for teacher in teachers %}
  <div class="col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center flex-shrink-0"
             style="width:48px;height:48px;font-size:1rem;">
          {{ teacher.initials }}
        </div>
        <div class="flex-grow-1 min-width-0">
          <div class="fw-semibold text-truncate">{{ teacher.get_full_name }}</div>
          <div class="text-muted small">Enseignant</div>
        </div>
        <a href="{% url 'timetable:teacher_timetable_by_id' teacher.pk %}"
           class="btn btn-outline-primary btn-sm flex-shrink-0">
          <i class="bi bi-calendar-week"></i>
        </a>
      </div>
    </div>
  </div>
  {% empty %}
  <div class="col-12">
    <div class="card border-0 shadow-sm">
      <div class="card-body text-center py-5 text-muted">
        <i class="bi bi-person-x fs-1 d-block mb-3 opacity-25"></i>
        <h6>Aucun enseignant trouvé</h6>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
