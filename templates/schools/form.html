{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{% url 'schools:list' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h4 class="mb-0 fw-bold">{{ title }}</h4>
</div>
<div class="row">
  <div class="col-lg-9">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2-circle me-1"></i>Enregistrer</button>
            <a href="{% url 'schools:list' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
