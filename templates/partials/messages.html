{% if messages %}
<div class="messages-container mb-3">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show d-flex align-items-center gap-2 shadow-sm border-0 rounded-3"
       role="alert" style="font-size:.875rem;">
    {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill text-success fs-5"></i>
    {% elif message.tags == 'error' or message.tags == 'danger' %}<i class="bi bi-x-circle-fill text-danger fs-5"></i>
    {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-triangle-fill text-warning fs-5"></i>
    {% else %}<i class="bi bi-info-circle-fill text-info fs-5"></i>{% endif %}
    <span>{{ message }}</span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Fermer"></button>
  </div>
  {% endfor %}
</div>
{% endif %}
