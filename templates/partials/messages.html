{% if messages %}
<div class="mb-4">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show d-flex align-items-center gap-2 shadow-sm border-0" role="alert">
    {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill text-success"></i>
    {% elif message.tags == 'error' or message.tags == 'danger' %}<i class="bi bi-x-circle-fill text-danger"></i>
    {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-triangle-fill text-warning"></i>
    {% else %}<i class="bi bi-info-circle-fill text-info"></i>{% endif %}
    <span>{{ message }}</span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>
{% endif %}
